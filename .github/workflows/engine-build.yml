name: Engine Build

on:
  workflow_dispatch:
  pull_request:

env:
  BUILD_TYPE: Release
  VCPKG_ROOT: ${{ github.workspace }}/External/vcpkg
  VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/.github/vcpkg-triplets

jobs:
  build:
    name: Build (${{ matrix.compiler }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
        - compiler: MSVC
          cmake_toolset_argument: ""
          sailor_toolset: ""
        - compiler: clang-cl
          cmake_toolset_argument: -T ClangCL
          sailor_toolset: ClangCL

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Update submodules
      run: git submodule update --init --recursive

    - name: Resolve vcpkg revision
      id: vcpkg
      shell: pwsh
      run: |
        "revision=$(git -C $env:VCPKG_ROOT rev-parse HEAD)" >> $env:GITHUB_OUTPUT

    - name: Cache vcpkg installed packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.VCPKG_ROOT }}/installed
          ${{ env.VCPKG_ROOT }}/packages
        key: vcpkg-${{ runner.os }}-${{ matrix.compiler }}-${{ steps.vcpkg.outputs.revision }}-installed-${{ env.BUILD_TYPE }}
        restore-keys: |
          vcpkg-${{ runner.os }}-${{ matrix.compiler }}-${{ steps.vcpkg.outputs.revision }}-installed-

    - name: Show CMake version
      run: cmake --version

    - name: Install dependencies
      run: python update_deps.py

    - name: Install Vulkan SDK
      uses: humbletim/install-vulkan-sdk@v1.2
      with:
        version: 1.3.296.0
        cache: true


    - name: Configure CMake
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 ${{ matrix.cmake_toolset_argument }} -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Diagnose workspace test runtime
      shell: pwsh
      run: |
        Write-Host "Runner Path: $env:Path"
        ctest --test-dir build -C $env:BUILD_TYPE -N -V -R "^WorkspaceModule"

        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsInstall = & $vswhere -latest -products * -property installationPath
        $toolsVersion = (Get-Content "$vsInstall\VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt").Trim()
        $dumpbin = "$vsInstall\VC\Tools\MSVC\$toolsVersion\bin\Hostx64\x64\dumpbin.exe"
        $binaries = Join-Path $env:GITHUB_WORKSPACE "Binaries\$env:BUILD_TYPE"

        & $dumpbin /DEPENDENTS (Join-Path $binaries "WorkspaceModuleContractTests.exe")
        & $dumpbin /DEPENDENTS (Join-Path $binaries "Sailor-Release.dll")

        Write-Host "Runtime DLLs beside tests:"
        Get-ChildItem $binaries -Filter *.dll | Select-Object Name, Length
        Write-Host "vcpkg runtime DLLs:"
        Get-ChildItem "$env:VCPKG_ROOT\installed\x64-windows\bin" -Filter *.dll | Select-Object Name, Length
        Write-Host "Vulkan runtime DLLs:"
        Get-ChildItem "$env:VULKAN_SDK\Bin" -Filter *.dll | Select-Object Name, Length

    - name: Test
      working-directory: build
      run: ctest -C ${{ env.BUILD_TYPE }}

    - name: Install Sailor CMake package
      run: cmake --install build --config ${{ env.BUILD_TYPE }} --prefix build/install

    - name: Set up .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Validate generated workspace projects
      run: dotnet test Editor.Tests/Editor.Contracts.Tests.csproj --configuration Release --filter "FullyQualifiedName~WorkspaceProjectGeneratorIntegrationTests"
      env:
        SAILOR_RUN_CMAKE_INTEGRATION: 1
        SAILOR_ENGINE_SOURCE_DIR: ${{ github.workspace }}
        SAILOR_ENGINE_INSTALL_PREFIX: ${{ github.workspace }}/build/install
        SAILOR_CMAKE_GENERATOR: Visual Studio 17 2022
        SAILOR_CMAKE_ARCHITECTURE: x64
        SAILOR_CMAKE_TOOLSET: ${{ matrix.sailor_toolset }}
        SAILOR_CMAKE_TOOLCHAIN_FILE: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
